services:
  minidb-dev:
    build: .
    container_name: minidb-dev
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true
    tty: true

  metrics-server:
    image: python:3.11-slim
    container_name: minidb-metrics-server
    working_dir: /app
    volumes:
      - .:/app
    command: python monitoring/metrics_server.py
    ports:
      - "9100:9100"
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: minidb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring
    depends_on:
      - metrics-server

  grafana:
    image: grafana/grafana
    container_name: minidb-grafana
    ports:
      - "3000:3000"
    profiles:
      - monitoring
    depends_on:
      - prometheus