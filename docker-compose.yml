services:
  minidb-dev:
    build: .
    container_name: minidb-dev
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true
    tty: true

  visualizer-server:
    image: python:3.11-slim
    container_name: minidb-visualizer-server
    working_dir: /app
    volumes:
      - .:/app
    command: python monitoring/visualizer_server.py
    ports:
      - "9100:9100"
    profiles:
      - monitoring
